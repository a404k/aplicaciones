<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<title>Aura Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0c;--surface:#16161a;--accent:#00f2ff;--accent-dark:#0066ff;--text:#ffffff;--sub:#94a3b8;--border:rgba(255,255,255,0.05);--shadow:0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;padding-bottom:60px;min-height:100vh}
.glow-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:radial-gradient(circle at 50% -20%, rgba(0,242,255,0.15), transparent 50%), radial-gradient(circle at 0% 100%, rgba(0,102,255,0.1), transparent 40%)}
nav{position:sticky;top:0;background:rgba(10,10,12,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:100;padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.brand{font-weight:800;font-size:24px;letter-spacing:-1px;background:linear-gradient(90deg,#fff,#00f2ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header{padding:50px 24px 30px;max-width:1000px;margin:0 auto;text-align:left}
header h1{font-size:42px;font-weight:800;letter-spacing:-2px;margin-bottom:8px;line-height:1}
header p{color:var(--sub);font-size:18px;font-weight:500}
main{max-width:1000px;margin:0 auto;padding:10px 24px;display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:24px}
.app-card{background:var(--surface);border-radius:32px;padding:24px;display:flex;align-items:center;gap:20px;box-shadow:var(--shadow);text-decoration:none;color:inherit;transition:all 0.5s cubic-bezier(0.16, 1, 0.3, 1);position:relative;border:1px solid var(--border);opacity:0;transform:translateY(30px);animation:appear 0.8s forwards}
.app-card:hover{transform:translateY(-8px) scale(1.02);border-color:rgba(0,242,255,0.3);box-shadow:0 30px 60px rgba(0,0,0,0.6), 0 0 20px rgba(0,242,255,0.1)}
.app-icon{width:88px;height:88px;border-radius:22px;object-fit:cover;box-shadow:0 15px 30px rgba(0,0,0,0.3);background:#252529;padding:2px}
.app-info{flex:1;min-width:0}
.app-info h2{font-size:19px;font-weight:700;margin-bottom:4px;letter-spacing:-0.5px}
.cat{font-size:13px;color:var(--sub);margin-bottom:14px;font-weight:600;display:block;text-transform:uppercase;letter-spacing:1px}
.btn-dl{background:linear-gradient(135deg, var(--accent), var(--accent-dark));color:#000;padding:10px 24px;border-radius:100px;font-size:14px;font-weight:800;display:inline-block;transition:all 0.3s ease;box-shadow:0 10px 20px rgba(0,242,255,0.2)}
.app-card:hover .btn-dl{transform:scale(1.05);box-shadow:0 15px 25px rgba(0,242,255,0.4)}
.badge{position:absolute;top:18px;right:18px;background:rgba(0,242,255,0.1);color:var(--accent);font-size:10px;font-weight:800;padding:4px 10px;border-radius:8px;border:1px solid rgba(0,242,255,0.2)}
@keyframes appear{to{opacity:1;transform:translateY(0)}}
@media (max-width:480px){header h1{font-size:36px}main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="glow-bg"></div>
<nav><div class="brand">Aura Store</div><div style="width:38px;height:38px;background:linear-gradient(135deg,#00f2ff,#0066ff);border-radius:12px;box-shadow:0 0 15px rgba(0,242,255,0.3)"></div></nav>
<header><h1>Explorar</h1><p>Aplicaciones premium seleccionadas</p></header>
<main id="app-grid"></main>
<script>
const apps=[
{n:'Cleaner',c:'Herramientas • v2.0.5',i:'logos/Cleaner.webp',f:'Cleaner.apk',new:false},
{n:'WhaTup',c:'Social • v1.8.0',i:'logos/Whatup.webp',f:'WhaTup.apk',new:false},
{n:'Wallpapers',c:'Personalizar • v11.18',i:'logos/Wallpaper.webp',f:'Wallpaper.apk',new:false},
{n:'TubePlus',c:'Streaming • v1.30.0',i:'logos/TubePlus.webp',f:'TubePlus.apk',new:true},
{n:'Nueva App',c:'Productividad • v1.0.0',i:'logos/Nueva.webp',f:'Nueva.apk',new:true}
];
const grid=document.getElementById('app-grid');
apps.forEach((app,i)=>{
const card=document.createElement('a');
card.href=app.f;
card.className='app-card';
card.style.animationDelay=`${i*0.15}s`;
card.setAttribute('download','');
card.innerHTML=`
${app.new?'<span class="badge">NUEVO</span>':''}
<img class="app-icon" src="${app.i}" alt="${app.n}" onerror="this.src='https://ui-avatars.com/api/?name=${app.n}&background=16161a&color=00f2ff'">
<div class="app-info">
<h2>${app.n}</h2>
<span class="cat">${app.c}</span>
<div class="btn-dl">DESCARGAR</div>
</div>`;
grid.appendChild(card);
});
document.addEventListener('contextmenu',e=>e.preventDefault());
</script>
</body>
</html>
