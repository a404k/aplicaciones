<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080b14">
<title>Crystalline Apps | APK Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b14;--glass:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--primary:#3b82f6;--secondary:#8b5cf6;--text:#f8fafc;--muted:#94a3b8;--success:#10b981}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;padding-bottom:40px}
.orbs{position:fixed;inset:0;z-index:-1;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4;animation:float 20s infinite alternate}
.o1{width:300px;height:300px;background:var(--primary);top:-50px;left:-50px}
.o2{width:250px;height:250px;background:var(--secondary);bottom:10%;right:-50px;animation-delay:-5s}
@keyframes float{from{transform:translate(0,0)}to{transform:translate(30px,50px)}}
header{width:100%;padding:50px 20px 30px;text-align:center;position:relative}
.logo{font-size:32px;font-weight:800;letter-spacing:-1.5px;background:linear-gradient(135deg,#fff,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.badge-v{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--success);background:rgba(16,185,129,0.1);padding:5px 12px;border-radius:20px;border:1px solid rgba(16,185,129,0.2)}
main{width:100%;max-width:480px;padding:20px;display:flex;flex-direction:column;gap:20px}
.card{background:var(--glass);border:1px solid var(--border);border-radius:32px;padding:24px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;text-align:center;transition:transform 0.3s cubic-bezier(0.2,0,0.2,1);position:relative;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.card:active{transform:scale(0.97)}
.icon-w{width:90px;height:90px;margin-bottom:16px;border-radius:24px;background:linear-gradient(145deg,rgba(255,255,255,0.08),transparent);padding:15px;border:1px solid var(--border);box-shadow:0 10px 20px rgba(0,0,0,0.2)}
.icon-w img{width:100%;height:100%;object-fit:contain}
.card h2{font-size:22px;font-weight:700;margin-bottom:4px}
.ver{font-size:11px;font-weight:800;color:var(--primary);background:rgba(59,130,246,0.1);padding:3px 10px;border-radius:8px;text-transform:uppercase;letter-spacing:1px;margin-bottom:15px}
.desc{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.tags{display:flex;gap:8px;margin-bottom:25px;justify-content:center}
.tags span{font-size:10px;font-weight:700;color:#fff;background:rgba(255,255,255,0.05);padding:5px 12px;border-radius:10px;border:1px solid var(--border)}
.dl{width:100%;padding:18px;border-radius:20px;font-size:16px;font-weight:700;text-decoration:none;color:#fff;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 10px 25px rgba(59,130,246,0.3);position:relative;overflow:hidden}
.dl::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transform:translateX(-100%);animation:sh 3s infinite}
@keyframes sh{20%,100%{transform:translateX(100%)}}
.dl.off{background:rgba(255,255,255,0.05);color:var(--muted);box-shadow:none;pointer-events:none}
footer{margin-top:20px;font-size:12px;color:var(--muted);font-weight:500}
</style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<header>
<h1 class="logo">Crystalline Apps</h1>
<div class="badge-v"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>APK Verificados</div>
</header>
<main id="g"></main>
<footer>© f_agustin_19 | Crystalline Studio</footer>
<script>
const apps=[
{n:'WhaTup',v:'1.8.0',i:'logos/Whatup.webp',d:'Recupera mensajes y multimedia borrados de WhatsApp con un solo toque.',f:'WhaTup.apk'},
{n:'Cleaner Pro',v:'2.0.4',i:'logos/Cleaner.webp',d:'Optimiza tu Android eliminando basura y acelerando el procesador.',f:'Cleaner.apk'},
{n:'TubePlus',v:'1.30.0',i:'logos/TubePlus.webp',d:'YouTube sin anuncios, modo nocturno y descargas en alta calidad.',f:'TubePlus.apk'},
{n:'TV-Gold',v:'1.5.0',i:'logos/Tv-Gold.webp',d:'Streaming premium con más de 1,400 canales internacionales en vivo.',f:'TV-Gold.apk'}
];
const grid=document.getElementById('g');
const draw=()=>{
let h='';
apps.forEach(a=>{
h+=`<article class="card">
<div class="icon-w"><img src="${a.i}" alt="${a.n}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzFmYjI5ZCIvPjwvc3ZnPg=='"></div>
<h2>${a.n}</h2><div class="ver">Versión ${a.v}</div>
<p class="desc">${a.d}</p>
<div class="tags"><span>No Ads</span><span>Seguro</span><span>Android</span></div>
<a href="${a.f}" class="dl" download><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Descargar APK</a>
</article>`;
});
grid.innerHTML=h;
};
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&e.key==='U'))e.preventDefault()});
draw();
</script>
</body>
</html>
