<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0b0f19">
    <title>AppStore | Descargas Seguras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta de confianza: Azules profundos y toques de índigo */
            --bg: #0b0f19;
            --card-bg: rgba(21, 26, 40, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6; /* Azul brillante (Confianza) */
            --secondary: #6366f1; /* Índigo */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.15), transparent 25%);
        }

        /* Header UI para móvil */
        header {
            width: 100%;
            padding: 40px 20px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(11,15,25,0.9) 0%, rgba(11,15,25,0) 100%);
            position: relative;
            z-index: 10;
        }
        
        .logo-title {
            font-size: clamp(28px, 6vw, 36px);
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .subtitle svg { color: var(--success); }

        /* Grid enfocado en celulares */
        main {
            width: 100%;
            max-width: 500px; /* Ancho máximo optimizado para lectura en móvil */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex: 1;
            z-index: 10;
        }

        /* Tarjetas Premium */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            width: 88px;
            height: 88px;
            margin-bottom: 16px;
            border-radius: 24px;
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            padding: 14px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 8px 16px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .app-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .app-version {
            font-size: 11px;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(59, 130, 246, 0.15);
            padding: 4px 10px;
            border-radius: 99px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .app-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .tags {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tags span {
            font-size: 11px;
            font-weight: 600;
            color: #cbd5e1;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Botón de Descarga Optimizado */
        .btn-download {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            width: 100%;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3), inset 0 1px 1px rgba(255,255,255,0.4);
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }

        .btn-download:active {
            transform: scale(0.97);
        }

        .btn-download::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* Estado Offline / No disponible */
        .btn-download.disabled {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            box-shadow: none;
            border: 1px solid var(--card-border);
            pointer-events: none;
        }
        
        .btn-download.disabled::after { display: none; }

        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status-badge.offline {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            opacity: 1;
        }

        footer {
            padding: 30px 0 20px;
            color: #475569;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        /* Utilidad de carga */
        .loading-spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <header>
        <h1 class="logo-title">AppStore</h1>
        <div class="subtitle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
            APK Seguros & Verificados
        </div>
    </header>

    <main id="app-grid"></main>

    <footer>©f_agustin_19 | Optimizadas para Android</footer>

    <script>
        "use strict";

        // Datos exclusivos para Android (eliminado Windows)
        const apps = [
            { id: 'app1', n: 'WhaTup', v: '1.8.0', i: 'logos/Whatup.webp', d: 'Recupera mensajes, imágenes, videos y audios borrados de WhatsApp fácilmente en tu celular.', f: 'WhaTup.apk' },
            { id: 'app2', n: 'Cleaner', v: '2.0.4', i: 'logos/Cleaner.webp', d: 'Elimina archivos basura, limpia la memoria caché y acelera tu dispositivo al máximo.', f: 'Cleaner.apk' },
            { id: 'app3', n: 'TubePlus', v: '1.30.0', i: 'logos/TubePlus.webp', d: 'Reproduce videos en segundo plano, sin anuncios molestos y con opción de descarga.', f: 'TubePlus.apk' },
            { id: 'app4', n: 'TV-Gold', v: '1.5.0', i: 'logos/Tv-Gold.webp', d: 'Disfruta de más de 1,400 canales de TV gratis en vivo: deportes, películas y series.', f: 'TV-Gold.apk' }
        ];

        const grid = document.getElementById('app-grid');

        // Función para renderizar el UI instantáneamente
        function renderApps() {
            let html = '';
            apps.forEach((app, index) => {
                // SVG Placeholder en caso de que la imagen no cargue
                const fallbackImg = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzFmMjkyZSIvPjwvc3ZnPg==";
                
                html += `
                    <article class="card" style="animation-delay: ${index * 0.1}s">
                        <div id="badge-${app.id}" class="status-badge">No Disp.</div>
                        <div class="icon-wrapper">
                            <img src="${app.i}" alt="${app.n}" onerror="this.src='${fallbackImg}'">
                        </div>
                        <h2 class="app-name">${app.n}</h2>
                        <div class="app-version">Versión ${app.v}</div>
                        <p class="app-desc">${app.d}</p>
                        <div class="tags">
                            <span>Ligero</span>
                            <span>Seguro</span>
                            <span>Sin Ads</span>
                        </div>
                        <a href="${app.f}" id="btn-${app.id}" class="btn-download disabled" download="${app.f}">
                            <div class="loading-spinner"></div>
                        </a>
                    </article>
                `;
            });
            grid.innerHTML = html;
        }

        // Verificador de archivos asíncrono para no bloquear la carga visual de la página
        async function checkFileAvailability(url) {
            if (url.startsWith('http')) return true;
            try {
                const response = await fetch(url, { method: 'HEAD' });
                return response.ok;
            } catch (e) {
                // Si falla (ej. bloqueado por CORS en pruebas locales), asumimos que existe por defecto
                // Cambiar a "return false" en producción si es estrictamente necesario verificar.
                return true; 
            }
        }

        // Actualizar los botones después de pintar la UI
        async function updateButtons() {
            for (const app of apps) {
                const isAvailable = await checkFileAvailability(app.f);
                const btn = document.getElementById(`btn-${app.id}`);
                const badge = document.getElementById(`badge-${app.id}`);

                if (isAvailable) {
                    btn.classList.remove('disabled');
                    btn.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Descargar APK
                    `;
                } else {
                    btn.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        No Disponible
                    `;
                    badge.classList.add('offline');
                }
            }
        }

        // Medidas de protección básicas
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Inicializar
        renderApps();
        // Un pequeño timeout para permitir que la animación de entrada fluya antes de hacer peticiones de red
        setTimeout(updateButtons, 300);

    </script>
</body>
</html>
