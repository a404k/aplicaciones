<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Aura Store | Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#ffffff;--accent:#0071e3;--text:#1d1d1f;--sub:#86868b;--card:rgba(255,255,255,0.7);--border:rgba(0,0,0,0.08);--shadow:0 8px 30px rgba(0,0,0,0.04)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;padding-bottom:100px}
.mesh-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:radial-gradient(at 0% 0%, rgba(0,113,227,0.05) 0%, transparent 50%), radial-gradient(at 100% 100%, rgba(0,113,227,0.03) 0%, transparent 50%)}
nav{position:sticky;top:0;background:rgba(255,255,255,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:100;padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.brand{font-weight:800;font-size:22px;letter-spacing:-0.5px}
.brand span{color:var(--accent)}
header{padding:40px 24px 20px;max-width:900px;margin:0 auto;animation:fadeInUp 0.8s ease}
header h1{font-size:34px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
header p{color:var(--sub);font-size:17px;font-weight:500}
main{max-width:900px;margin:0 auto;padding:12px 24px;display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:20px}
.app-card{background:var(--card);border-radius:28px;padding:18px;display:flex;align-items:center;gap:18px;box-shadow:var(--shadow);border:1px solid var(--border);text-decoration:none;color:inherit;transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);position:relative;overflow:hidden;animation:fadeInUp 0.8s ease backwards}
.app-card:active{transform:scale(0.95);background:rgba(242,242,247,0.8)}
.app-icon{width:82px;height:82px;border-radius:18px;object-fit:cover;box-shadow:0 10px 20px rgba(0,0,0,0.08);background:#f2f2f7}
.app-info{flex:1;min-width:0}
.app-info h2{font-size:17px;font-weight:700;margin-bottom:2px}
.cat{font-size:13px;color:var(--sub);margin-bottom:10px;font-weight:600;display:block}
.btn-dl{background:#f0f0f7;color:var(--accent);padding:8px 20px;border-radius:20px;font-size:13px;font-weight:800;text-transform:uppercase;display:inline-block;transition:all 0.3s ease}
.app-card:hover .btn-dl{background:var(--accent);color:#fff}
.new-tag{background:var(--accent);color:#fff;font-size:10px;padding:2px 8px;border-radius:8px;position:absolute;top:15px;right:15px;font-weight:800}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media (max-width: 480px){main{grid-template-columns:1fr;padding:10px 20px}}
</style>
</head>
<body>
<div class="mesh-bg"></div>
<nav><div class="brand">Aura<span>Store</span></div><div style="width:34px;height:34px;background:linear-gradient(45deg, #0071e3, #38bdf8);border-radius:50%"></div></nav>
<header><h1>Apps</h1><p>Las mejores herramientas</p></header>
<main id="app-grid"></main>
<script>
const apps=[
{n:'Cleaner',c:'Utilidad • v2.0.5',i:'logos/Cleaner.webp',f:'Cleaner.apk',new:false},
{n:'WhaTup',c:'Social • v1.8.0',i:'logos/Whatup.webp',f:'WhaTup.apk',new:false},
{n:'Wallpapers',c:'Diseño • v11.18',i:'logos/Wallpaper.webp',f:'Wallpaper.apk',new:false},
{n:'TubePlus',c:'Video • v1.30.0',i:'logos/TubePlus.webp',f:'TubePlus.apk',new:true}
];
const grid=document.getElementById('app-grid');
apps.forEach((app, index)=>{
const card=document.createElement('a');
card.href=app.f;
card.className='app-card';
card.style.animationDelay=`${index*0.1}s`;
card.setAttribute('download','');
card.innerHTML=`
${app.new?'<span class="new-tag">NUEVA</span>':''}
<img class="app-icon" src="${app.i}" alt="${app.n}" onerror="this.src='https://ui-avatars.com/api/?name=${app.n}&background=0071e3&color=fff'">
<div class="app-info">
<h2>${app.n}</h2>
<span class="cat">${app.c}</span>
<div class="btn-dl">Obtener</div>
</div>`;
grid.appendChild(card);
});
document.addEventListener('contextmenu',e=>e.preventDefault());
</script>
</body>
</html>
