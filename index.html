<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#f1f5f9">
<title>Crystalline Apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f1f5f9;--glass:rgba(255,255,255,0.65);--border:rgba(255,255,255,0.8);--txt:#334155;--txt-m:#64748b;--p:#6366f1;--s:#a855f7;--sdw:rgba(148,163,184,0.15)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;padding-bottom:40px}
.bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 15% 30%,#e0e7ff 0%,transparent 50%),radial-gradient(circle at 85% 20%,#fae8ff 0%,transparent 50%),radial-gradient(circle at 50% 80%,#ccfbf1 0%,transparent 50%)}
header{width:100%;padding:40px 20px 20px;text-align:center}
.lg{font-size:32px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.bdg{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#059669;background:rgba(16,185,129,0.1);padding:6px 14px;border-radius:20px;border:1px solid rgba(16,185,129,0.2)}
main{width:100%;max-width:480px;padding:15px;display:flex;flex-direction:column;gap:22px}
.c{background:var(--glass);border:1px solid var(--border);border-radius:32px;padding:26px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:0 15px 35px var(--sdw),inset 0 1px 1px #fff;transition:transform .2s}
.c:active{transform:scale(.97)}
.ic{width:84px;height:84px;margin-bottom:18px;border-radius:24px;background:#fff;padding:14px;box-shadow:0 8px 20px var(--sdw),inset 0 2px 4px rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.9)}
.ic img{width:100%;height:100%;object-fit:contain}
.c h2{font-size:22px;font-weight:800;margin-bottom:6px;color:#1e293b}
.v{font-size:11px;font-weight:800;color:var(--p);background:rgba(99,102,241,0.1);padding:4px 12px;border-radius:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.d{font-size:14px;color:var(--txt-m);line-height:1.5;margin-bottom:22px}
.t{display:flex;gap:8px;margin-bottom:24px;justify-content:center}
.t span{font-size:11px;font-weight:700;color:#475569;background:rgba(255,255,255,0.8);padding:6px 14px;border-radius:12px;border:1px solid var(--border)}
.btn{width:100%;padding:16px;border-radius:20px;font-size:16px;font-weight:700;text-decoration:none;color:#fff;background:linear-gradient(135deg,var(--p),var(--s));display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 10px 25px rgba(99,102,241,0.25),inset 0 1px 1px rgba(255,255,255,0.3);position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transform:translateX(-100%);animation:sh 3s infinite}
@keyframes sh{20%,100%{transform:translateX(100%)}}
footer{margin-top:20px;font-size:13px;color:var(--txt-m);font-weight:600}
</style>
</head>
<body>
<div class="bg"></div>
<header>
<h1 class="lg">Crystalline Apps</h1>
<div class="bdg"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>APK Seguros</div>
</header>
<main id="m"></main>
<footer>© f_agustin_19</footer>
<script>
const a=[
{n:'WhaTup',v:'1.8.0',i:'logos/Whatup.webp',d:'Recupera mensajes y multimedia borrados de WhatsApp con un solo toque.',f:'WhaTup.apk'},
{n:'Cleaner Pro',v:'2.0.4',i:'logos/Cleaner.webp',d:'Optimiza tu Android eliminando basura y acelerando el procesador.',f:'Cleaner.apk'},
{n:'TubePlus',v:'1.30.0',i:'logos/TubePlus.webp',d:'YouTube sin anuncios, modo nocturno y descargas en alta calidad.',f:'TubePlus.apk'},
{n:'TV-Gold',v:'1.5.0',i:'logos/Tv-Gold.webp',d:'Streaming premium con más de 1,400 canales internacionales en vivo.',f:'TV-Gold.apk'}
];
const m=document.getElementById('m');
let h='';
a.forEach(x=>{
h+=`<article class="c"><div class="ic"><img src="${x.i}" alt="${x.n}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI2UyZThmMCIvPjwvc3ZnPg=='"></div><h2>${x.n}</h2><div class="v">v${x.v}</div><p class="d">${x.d}</p><div class="t"><span>No Ads</span><span>Seguro</span><span>Android</span></div><a href="${x.f}" class="btn" download><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Descargar APK</a></article>`;
});
m.innerHTML=h;
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&e.key==='U'))e.preventDefault()});
</script>
</body>
</html>
