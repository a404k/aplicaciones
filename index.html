<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--ac:#8b4cf6;--g1:#a755ff;--g2:#7c3aed;--txt:#f8f8f8;--txt-m:#a19bb3;--cd:rgba(255,255,255,0.03);--br:rgba(255,255,255,0.08)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background-color:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:clamp(20px,4vw,40px);overflow-x:hidden}
.orb{position:fixed;border-radius:50%;filter:blur(clamp(60px,10vw,120px));z-index:-1;pointer-events:none;will-change:transform}
.o1{width:40vw;height:40vw;max-width:400px;max-height:400px;background:rgba(167,85,255,0.25);top:-10%;left:50%;transform:translate3d(-50%,0,0)}
.o2{width:35vw;height:35vw;max-width:350px;max-height:350px;background:rgba(124,58,237,0.2);bottom:-5%;left:-5%;transform:translate3d(0,0,0)}
.o3{width:30vw;height:30vw;max-width:300px;max-height:300px;background:rgba(167,85,255,0.15);bottom:-5%;right:-5%;transform:translate3d(0,0,0)}
.sw{background:var(--cd);border:1px solid var(--br);border-radius:18px;padding:6px;display:flex;margin-bottom:clamp(30px,5vw,50px);position:relative;z-index:10;user-select:none;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.btn-sw{flex:1;padding:12px clamp(20px,3vw,30px);border:none;border-radius:14px;font-size:clamp(13px,1.5vw,15px);font-weight:600;cursor:pointer;background:transparent;color:var(--txt-m);transition:color .3s cubic-bezier(.4,0,.2,1);position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-sw.act{color:#fff}
.btn-sw .b{position:absolute;inset:0;background:linear-gradient(135deg,var(--g1),var(--g2));border-radius:14px;opacity:0;transform:scale3d(.95,.95,1);transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s cubic-bezier(.4,0,.2,1);z-index:-1;box-shadow:0 8px 24px rgba(124,58,237,.4)}
.btn-sw.act .b{opacity:1;transform:scale3d(1,1,1)}
.grid{width:100%;max-width:1100px;display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,300px),1fr));gap:clamp(20px,3vw,30px);justify-items:center}
.cd{background:var(--cd);border:1px solid var(--br);border-radius:32px;padding:clamp(24px,4vw,36px);display:flex;flex-direction:column;align-items:center;text-align:center;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);width:100%;transition:transform .4s cubic-bezier(.175,.885,.32,1.275),border-color .4s;will-change:transform;opacity:0;animation:in .6s cubic-bezier(.4,0,.2,1) forwards;position:relative;overflow:hidden}
.cd::before{content:'';position:absolute;inset:0;background:radial-gradient(800px circle at var(--x,50%) var(--y,50%),rgba(255,255,255,.06),transparent 40%);opacity:0;transition:opacity .3s;z-index:-1}
.cd:hover::before{opacity:1}
.cd:hover{transform:translate3d(0,-8px,0);border-color:rgba(255,255,255,.15)}
@keyframes in{from{opacity:0;transform:translate3d(0,30px,0)}to{opacity:1;transform:translate3d(0,0,0)}}
.ic-w{width:clamp(80px,10vw,96px);height:clamp(80px,10vw,96px);margin-bottom:20px;border-radius:26px;background:rgba(255,255,255,.04);padding:12px;box-shadow:inset 0 1px 1px rgba(255,255,255,.1),0 8px 24px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;transition:transform .4s cubic-bezier(.175,.885,.32,1.275);will-change:transform}
.cd:hover .ic-w{transform:scale3d(1.08,1.08,1)}
.ic-w img{width:100%;height:100%;object-fit:contain}
.tt{font-size:clamp(1.5rem,3vw,2rem);font-weight:800;letter-spacing:-.5px;margin-bottom:4px;background:linear-gradient(135deg,#fff,#c4a8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.vs{font-size:11px;font-weight:700;color:var(--ac);margin-bottom:16px;text-transform:uppercase;letter-spacing:1.5px;background:rgba(139,76,246,.15);padding:4px 10px;border-radius:99px}
.ds{font-size:clamp(13px,1.5vw,14px);color:var(--txt-m);line-height:1.6;margin-bottom:28px;flex:1}
.ft{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
.ft span{font-size:11px;font-weight:600;color:#b8a0d8;background:rgba(255,255,255,.05);padding:6px 12px;border-radius:99px;border:1px solid rgba(255,255,255,.03)}
.dl{display:flex;align-items:center;gap:8px;padding:16px 32px;border-radius:99px;font-size:clamp(14px,1.5vw,15px);font-weight:700;text-decoration:none;position:relative;overflow:hidden;transition:transform .2s cubic-bezier(.4,0,.2,1),filter .2s;width:100%;justify-content:center;user-select:none;touch-action:manipulation}
.dl:not(.no){background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;box-shadow:0 12px 32px rgba(124,58,237,.4),inset 0 1px 1px rgba(255,255,255,.3)}
.dl:not(.no):hover{transform:translate3d(0,-2px,0);filter:brightness(1.1)}
.dl:not(.no):active{transform:translate3d(0,2px,0) scale3d(.98,.98,1)}
.dl.no{background:rgba(255,255,255,.05);color:var(--txt-m);border:1px solid var(--br);cursor:not-allowed}
.dl::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transform:translateX(-100%);transition:transform .6s}
.dl:not(.no):hover::after{transform:translateX(100%)}
.err{position:absolute;top:16px;right:16px;color:#ff5555;font-size:11px;font-weight:700;background:rgba(255,85,85,.1);padding:4px 10px;border-radius:99px;opacity:0;pointer-events:none;transition:opacity .3s;border:1px solid rgba(255,85,85,.2)}
.err.s{opacity:1}
footer{margin-top:auto;padding:40px 0 10px;color:var(--txt-m);font-size:12px;font-weight:500;text-align:center}
@media(max-width:480px){.sw{width:100%}.btn-sw{padding:14px 10px}.btn-sw span:not(.b){display:none}.btn-sw svg{width:22px;height:22px}}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="sw">
<button class="btn-sw" data-p="android" onclick="sp('android')">
<span class="b"></span><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.52 18c.64 0 1.16-.52 1.16-1.16v-6.32c0-.64-.52-1.16-1.16-1.16-.64 0-1.16.52-1.16 1.16v6.32c0 .64.52 1.16 1.16 1.16zM6.48 18c.64 0 1.16-.52 1.16-1.16v-6.32c0-.64-.52-1.16-1.16-1.16s-1.16.52-1.16 1.16v6.32c0 .64.52 1.16 1.16 1.16zm11.33-10.6l1.37-2.37a.5.5 0 0 0-.17-.69.5.5 0 0 0-.69.17l-1.38 2.39C15.8 6.32 14 6 12 6s-3.8.32-5.04.9L5.58 4.51a.5.5 0 0 0-.69-.17.5.5 0 0 0-.17.69l1.37 2.37c-2.43 1.25-3.9 3.2-3.9 5.4H20c0-2.2-1.47-4.15-3.9-5.4zM8 12a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm8 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/></svg><span>Android</span>
</button>
<button class="btn-sw" data-p="windows" onclick="sp('windows')">
<span class="b"></span><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 5.545l7.16-.925v7.19H3V5.545zM11.2 4.49L21 3.11v8.61h-9.8V4.49zm0 8.33H21V21.1l-9.8-1.39v-6.89zm-8.2.33h7.16v6.62L3 18.82v-5.67z"/></svg><span>Windows</span>
</button>
</div>
<div class="grid" id="gd"></div>
<footer>©f_agustin_19</footer>
<script>
"use strict";
const d={
android:[{n:'Cleaner',v:'2.0.1',i:'logos/Cleaner.webp',d:'Elimina archivos basura, limpia caché y mejora el rendimiento de tu Android en segundos.',f:'Cleaner.apk'},{n:'TubePlus',v:'1.0.0',i:'logos/TubePlus.png',d:'Descarga videos y audio de YouTube, reproduce en segundo plano y sin anuncios.',f:'TubePlus.apk'},{n:'TV-Gold',v:'1.5.0',i:'logos/Tv-Gold.webp',d:'1,473 canales de TV gratis en vivo: noticias, deportes, películas y más.',f:'TV-Gold.apk'}],
windows:[{n:'AutoClick',v:'1.0.0',i:'logos/Autoclick.ico',d:'Automatiza tus clics con macros avanzadas para simplificar tareas repetitivas.',f:'https://download1474.mediafire.com/ufezqo0up4pgnSfFNkFu1yjr1LdeN8QzCJuILjLgKjs2gIpeTSKdXwdpTCmYSWZhKEgBIHXQKuEbLvacII_G0YOm56kUY4hr1n7XkK55GSccin6eHikS69HpM_9v3872kZ1i62JIOCIzZK7GxGAO1-0U7gpdqJmbxfMMkwreQl1XNA/wnymx22tqrcjmva/AutoClick.7z'},{n:'Limpiador',v:'1.2.0',i:'logos/Limpiador.ico',d:'Limpia tu PC eliminando temporales y caché para un rendimiento óptimo.',f:'https://download1584.mediafire.com/izdd8spz3sxglecQ8cVry1M35pqi_SfRVl-ISkjuYMI_RmxfY5Ljry8yzB1hzbN1vel7aRSozWgRz_fbEajiuDu6IlfjI0Jo1Z2RH2-Epeohb5Bkmbu7JLqIz6-ASj_vVDgKXwPzW6F-soon20fP5UJCIW9SFp611E39-GFybi9mlg/bbb4ecshfyhuvrq/Limpiador.7z'}]};
let cp=null;
function gp(){return/win|mac|linux/i.test(navigator.userAgent||navigator.vendor||window.opera)?'windows':'android'}
function sp(p){if(p===cp)return;cp=p;document.querySelectorAll('.btn-sw').forEach(b=>b.classList.toggle('act',b.dataset.p===p));ra()}
async function cf(u){if(u.startsWith('http'))return!0;try{const r=await fetch(u,{method:'HEAD'});return r.ok}catch(e){return!0}}
async function ra(){const g=document.getElementById('gd');g.innerHTML='';const l=d[cp]||[];l.forEach(async(a,x)=>{const c=document.createElement('div');c.className='cd';c.style.animationDelay=`${x*.1}s`;c.onmousemove=e=>{const r=c.getBoundingClientRect();c.style.setProperty('--x',`${e.clientX-r.left}px`);c.style.setProperty('--y',`${e.clientY-r.top}px`)};const k=await cf(a.f);c.innerHTML=`<div class="ic-w"><img src="${a.i}" alt="${a.n}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzIyMiIvPjwvc3ZnPg=='"></div><div class="tt">${a.n}</div><div class="vs">v${a.v}</div><div class="ds">${a.d}</div><div class="ft"><span>Ligero</span><span>Seguro</span><span>Sin Ads</span></div><a href="${a.f}" class="dl ${k?'':'no'}" ${k?`download="${a.f.split('/').pop()}"`:'onclick="return!1" disabled'}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>${k?'Descargar':'No Disp.'}</a><div class="err ${k?'':'s'}">Offline</div>`;g.appendChild(c)})}
document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&e.key==='U'))e.preventDefault()});
document.addEventListener('contextmenu',e=>e.preventDefault());
sp(gp());
</script>
</body>
</html>
