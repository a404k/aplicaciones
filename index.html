<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050505">
<title>Aura APKs | Descargas Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--glass-bg:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));--glass-border:rgba(255,255,255,0.1);--accent1:#0ea5e9;--accent2:#3b82f6;--txt:#ffffff;--txt-m:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;padding-bottom:40px;overscroll-behavior-y:none}
.blob-c{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none;background:#050505}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.4;animation:float 20s ease-in-out infinite alternate;will-change:transform;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:translateZ(0)}
.b1{width:300px;height:300px;background:#0ea5e9;top:-10%;left:-10%}
.b2{width:350px;height:350px;background:#3b82f6;bottom:20%;right:-20%;animation-delay:-10s}
@keyframes float{0%{transform:translate3d(0,0,0) scale(1)}100%{transform:translate3d(40px,60px,0) scale(1.1)}}
header{width:100%;padding:50px 20px 25px;text-align:center;z-index:1}
.logo{font-size:36px;font-weight:800;letter-spacing:-1px;color:#fff;margin-bottom:12px;text-shadow:0 0 20px rgba(14,165,233,0.4)}
.logo span{color:var(--accent1)}
.trust-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#38bdf8;background:rgba(56,189,248,0.1);padding:6px 16px;border-radius:20px;border:1px solid rgba(56,189,248,0.2)}
main{width:100%;max-width:460px;padding:15px;display:flex;flex-direction:column;gap:24px;z-index:1}
.card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:32px;padding:28px;backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:0 24px 40px rgba(0,0,0,0.4),inset 0 1px 1px rgba(255,255,255,0.15);transition:transform .2s ease;position:relative}
.card:active{transform:scale(.97)}
.icon-w{width:88px;height:88px;margin-bottom:20px;border-radius:24px;background:rgba(0,0,0,0.3);padding:14px;box-shadow:inset 0 2px 4px rgba(255,255,255,0.1),0 8px 16px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.08)}
.icon-w img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4))}
.card h2{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
.ver{font-size:11px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent1),var(--accent2));padding:4px 12px;border-radius:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;box-shadow:0 4px 12px rgba(14,165,233,0.3)}
.desc{font-size:14px;color:var(--txt-m);line-height:1.6;margin-bottom:24px}
.tags{display:flex;gap:10px;margin-bottom:28px;justify-content:center;flex-wrap:wrap}
.tags span{font-size:11px;font-weight:600;color:#cbd5e1;background:rgba(255,255,255,0.03);padding:6px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.06)}
.btn{width:100%;padding:18px;border-radius:20px;font-size:16px;font-weight:600;text-decoration:none;color:#fff;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 12px 28px rgba(14,165,233,0.35),inset 0 1px 1px rgba(255,255,255,0.4);position:relative;overflow:hidden;transition:filter .2s;-webkit-user-select:none;user-select:none}
.btn:active{filter:brightness(1.1)}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);transform:translateX(-100%);animation:sh 3s infinite}
@keyframes sh{20%,100%{transform:translateX(100%)}}
footer{margin-top:30px;font-size:13px;color:#475569;font-weight:500;z-index:1}
</style>
</head>
<body>
<div class="blob-c"><div class="blob b1"></div><div class="blob b2"></div></div>
<header>
<h1 class="logo">Aura <span>APKs</span></h1>
<div class="trust-badge"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>100% Libre de Virus</div>
</header>
<main id="app-grid"></main>
<footer>© f_agustin_19 | Aura Studio</footer>
<script>
const apps=[
{n:'WhaTup',v:'1.8.0',i:'logos/Whatup.webp',d:'Recupera mensajes, audios y fotos eliminadas de WhatsApp al instante.',f:'WhaTup.apk'},
{n:'Cleaner Pro',v:'2.0.4',i:'logos/Cleaner.webp',d:'Limpia caché profunda, libera espacio y acelera tu dispositivo Android.',f:'Cleaner.apk'},
{n:'TubePlus',v:'1.30.0',i:'logos/TubePlus.webp',d:'Disfruta videos sin interrupciones, segundo plano y descargas premium.',f:'TubePlus.apk'},
{n:'TV-Gold',v:'1.5.0',i:'logos/Tv-Gold.webp',d:'Acceso a más de 1,400 canales en vivo, deportes y películas en HD.',f:'TV-Gold.apk'}
];
const grid=document.getElementById('app-grid');
let html='';
apps.forEach(app=>{
html+=`<article class="card"><div class="icon-w"><img src="${app.i}" alt="${app.n}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzIyMiIvPjwvc3ZnPg=='"></div><h2>${app.n}</h2><div class="ver">v${app.v}</div><p class="desc">${app.d}</p><div class="tags"><span>Sin Anuncios</span><span>Optimizado</span><span>Android</span></div><a href="${app.f}" class="btn" download><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Descargar APK</a></article>`;
});
grid.innerHTML=html;
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&e.key==='U'))e.preventDefault()});
</script>
</body>
</html>
