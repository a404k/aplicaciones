<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0d0b14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Cleaner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color:#e8e8f0;
      background:
        radial-gradient(ellipse at 50% -15%, rgba(167,85,255,.5), transparent 50%),
        radial-gradient(ellipse at 15% 85%, rgba(120,60,255,.4), transparent 50%),
        radial-gradient(ellipse at 85% 85%, rgba(200,140,255,.35), transparent 50%),
        linear-gradient(160deg, #0f0b1a 0%, #0c0918 50%, #08060f 100%);
      min-height:100vh;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding:20px;
      overflow-x:hidden;
      overflow-y:auto;
    }
    .bg-orb{
      position:fixed;
      border-radius:50%;
      filter:blur(80px);
      pointer-events:none;
      z-index:0;
      animation:orbFloat 8s ease-in-out infinite;
    }
    .bg-orb-1{
      width:300px;height:300px;
      top:-80px;left:50%;
      transform:translateX(-50%);
      background:radial-gradient(circle, rgba(167,85,255,.45), transparent 70%);
      animation-delay:0s;
    }
    .bg-orb-2{
      width:250px;height:250px;
      bottom:-60px;left:10%;
      background:radial-gradient(circle, rgba(130,70,255,.35), transparent 70%);
      animation-delay:-3s;
    }
    .bg-orb-3{
      width:220px;height:220px;
      bottom:-40px;right:5%;
      background:radial-gradient(circle, rgba(200,140,255,.3), transparent 70%);
      animation-delay:-5s;
    }
    @keyframes orbFloat{
      0%,100%{transform:translateX(-50%) translateY(0px) scale(1)}
      33%{transform:translateX(-50%) translateY(-15px) scale(1.05)}
      66%{transform:translateX(-50%) translateY(10px) scale(0.97)}
    }
    .platform-switch{
      display:flex;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      border-radius:16px;
      padding:5px;
      margin:20px 0 30px;
      position:relative;
      z-index:100;
      animation:switchEntrance .6s cubic-bezier(.34,1.56,.64,1) forwards;
      opacity:0;
      transform:translateY(-15px);
    }
    @keyframes switchEntrance{
      to{opacity:1;transform:translateY(0)}
    }
    .platform-btn{
      padding:10px 24px;
      border:none;
      border-radius:12px;
      font-size:0.88rem;
      font-weight:600;
      cursor:pointer;
      background:transparent;
      color:#8b7fa8;
      transition:all .3s ease;
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .platform-btn.active{
      color:#fff;
    }
    .platform-btn .bg{
      position:absolute;
      inset:0;
      border-radius:12px;
      background:linear-gradient(135deg, #9d5cff 0%, #8b4cf6 50%, #7c3aed 100%);
      box-shadow:0 4px 20px rgba(139,92,246,.5);
      transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
      opacity:0;
      transform:scale(.9);
    }
    .platform-btn.active .bg{
      opacity:1;
      transform:scale(1);
    }
    .platform-btn span{
      position:relative;
      z-index:1;
    }
    .main-container{
      width:100%;
      max-width:800px;
      display:flex;
      flex-direction:column;
      align-items:center;
      position:relative;
      z-index:1;
    }
    .cards-windows{
      display:flex;
      flex-direction:row;
      justify-content:center;
      align-items:flex-start;
      flex-wrap:wrap;
      gap:24px;
      width:100%;
    }
    .cards-android{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:100%;
      position:relative;
      min-height:480px;
    }
    .card{
      background: rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.15);
      border-radius:28px;
      padding:40px 36px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow:
        0 32px 80px rgba(0,0,0,.7),
        0 0 80px rgba(139,92,246,.12),
        inset 0 1px 0 rgba(255,255,255,.12);
      text-align:center;
      width:100%;
      max-width:340px;
      position:relative;
      animation:cardEntrance .8s cubic-bezier(.34,1.56,.64,1) forwards;
      opacity:0;
      transform:translateY(30px) scale(.95);
    }
    .cards-windows .card{
      flex:1 1 300px;
      max-width:360px;
      min-width:280px;
    }
    .cards-android .card{
      position:absolute;
      top:0;
      left:50%;
      transform:translateX(-50%) translateY(30px) scale(.95);
      opacity:0;
      transition:all .5s cubic-bezier(.25,.46,.45,.94);
    }
    .cards-android .card.visible{
      transform:translateX(-50%) translateY(0) scale(1);
      opacity:1;
    }
    .card:nth-child(1){animation-delay:.1s}
    .card:nth-child(2){animation-delay:.2s}
    @keyframes cardEntrance{
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    .card::before{
      content:'';
      position:absolute;
      top:-1px;left:-1px;right:-1px;bottom:-1px;
      border-radius:29px;
      background: linear-gradient(135deg, rgba(200,160,255,.3), rgba(139,92,246,.1), rgba(100,60,220,.2));
      z-index:-1;
      opacity:0;
      transition:opacity .5s;
    }
    .card:hover::before{opacity:1}
    .icon-wrap{
      width:88px;
      height:88px;
      margin:0 auto 18px;
      border-radius:22px;
      background: linear-gradient(145deg, rgba(200,160,255,.35), rgba(167,100,255,.25));
      border:1px solid rgba(255,255,255,.2);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:48px;
      box-shadow: 0 8px 40px rgba(167,85,255,.5);
      animation:iconEntrance 1s cubic-bezier(.34,1.56,.64,1) .2s forwards;
      opacity:0;
      transform:scale(0);
      position:relative;
      overflow:hidden;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
    }
    .icon-wrap:hover{
      transform:scale(1.08);
      box-shadow: 0 12px 50px rgba(167,85,255,.7);
    }
    .icon-wrap:active{
      transform:scale(0.95);
      box-shadow: 0 4px 20px rgba(167,85,255,.4);
    }
    .icon-wrap::before{
      content:'';
      position:absolute;
      inset:0;
      border-radius:22px;
      padding:2px;
      background: linear-gradient(135deg, rgba(200,160,255,.5), rgba(167,85,255,.3), rgba(139,92,246,.4));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity:0;
      transition:opacity .3s;
    }
    .icon-wrap:hover::before{opacity:1}
    .icon-wrap::after{
      content:'';
      position:absolute;
      top:-50%;
      left:-50%;
      width:200%;
      height:200%;
      background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,.15) 50%, transparent 60%);
      animation:iconShine 3s ease-in-out infinite;
    }
    @keyframes iconEntrance{
      to{opacity:1;transform:scale(1)}
    }
    @keyframes iconShine{
      0%{transform:translateX(-100%) rotate(45deg)}
      50%,100%{transform:translateX(100%) rotate(45deg)}
    }
    .icon-bounce{
      animation:iconBounce 2.5s ease-in-out 1.5s infinite;
      position:relative;
      z-index:1;
    }
    @keyframes iconBounce{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-5px)}
    }
    .name{
      font-size:1.9rem;
      font-weight:800;
      letter-spacing:-0.5px;
      background: linear-gradient(135deg, #f0e8ff 0%, #d8c8ff 30%, #c4a8ff 60%, #dcc8ff 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:5px;
      animation:nameEntrance .8s ease-out .4s forwards;
      opacity:0;
      transform:translateY(10px);
    }
    @keyframes nameEntrance{
      to{opacity:1;transform:translateY(0)}
    }
    .version{
      font-size:0.75rem;
      font-weight:500;
      color:#b8a0d8;
      margin-bottom:20px;
      letter-spacing:2px;
      text-transform:uppercase;
      animation:versionEntrance .8s ease-out .5s forwards;
      opacity:0;
    }
    @keyframes versionEntrance{
      to{opacity:1}
    }
    .desc{
      font-size:0.85rem;
      color:#a090c8;
      line-height:1.6;
      margin-bottom:26px;
      animation:descEntrance .8s ease-out .6s forwards;
      opacity:0;
      transform:translateY(8px);
    }
    @keyframes descEntrance{
      to{opacity:1;transform:translateY(0)}
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:14px 38px;
      border-radius:999px;
      border:0;
      font-size:0.92rem;
      font-weight:700;
      cursor:pointer;
      position:relative;
      z-index:1;
      letter-spacing:0.3px;
      animation:btnEntrance .8s cubic-bezier(.34,1.56,.64,1) .7s forwards;
      opacity:0;
      transform:translateY(15px) scale(.9);
      overflow:hidden;
    }
    .btn::before{
      content:'';
      position:absolute;
      inset:0;
      border-radius:999px;
      padding:2px;
      background: linear-gradient(135deg, #c4a8ff, #8b5cf6, #7c3aed);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity:0;
      transition:opacity .3s;
    }
    .btn.download{
      background: linear-gradient(135deg, #9d5cff 0%, #8b4cf6 40%, #7c3aed 70%, #6d28d9 100%);
      color:#fff;
      box-shadow: 0 8px 35px rgba(167,85,255,.55), 0 2px 8px rgba(0,0,0,.3);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
    }
    .btn.download:hover{
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 14px 50px rgba(167,85,255,.75), 0 4px 15px rgba(0,0,0,.3);
    }
    .btn.download:hover::before{opacity:1}
    .btn.download:active{
      transform: translateY(-1px) scale(1.01);
      box-shadow: 0 6px 25px rgba(167,85,255,.5);
    }
    .btn.download.unavailable{
      background: linear-gradient(135deg, #ff4d4d 0%, #e63939 40%, #cc2936 70%, #b3182a 100%);
      box-shadow: 0 8px 35px rgba(255,77,77,.55), 0 2px 8px rgba(0,0,0,.3);
    }
    .btn.download.unavailable:hover{
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 14px 50px rgba(255,77,77,.75), 0 4px 15px rgba(0,0,0,.3);
    }
    .btn.download.unavailable::before{
      background: linear-gradient(135deg, #ff8080, #ff4d4d, #e63939);
    }
    .btn-glow{
      position:absolute;
      width:120px;
      height:120px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(167,85,255,.4), transparent 70%);
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      pointer-events:none;
      z-index:-1;
      animation:btnGlow 2s ease-in-out infinite;
    }
    @keyframes btnGlow{
      0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}
      50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}
    }
    @keyframes btnEntrance{
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    .footer{
      margin-top:20px;
      font-size:0.7rem;
      color:#5a4e78;
      animation:footerEntrance .8s ease-out .9s forwards;
      opacity:0;
    }
    @keyframes footerEntrance{
      to{opacity:1}
    }
    .footer span{
      color:#9b7fd0;
      font-weight:600;
    }
    .dots{
      display:inline-flex;
      gap:5px;
      margin-left:4px;
      vertical-align:middle;
    }
    .dot{
      width:4px;
      height:4px;
      border-radius:50%;
      background:#7b5fbf;
      animation:dotPulse 1.5s ease-in-out infinite;
    }
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes dotPulse{
      0%,100%{opacity:.4;transform:scale(1)}
      50%{opacity:1;transform:scale(1.3)}
    }
    .swipe-indicator{
      display:none;
      position:absolute;
      bottom:-60px;
      left:50%;
      transform:translateX(-50%);
      flex-direction:column;
      align-items:center;
      gap:10px;
      z-index:50;
      animation:fadeIn 1s ease-out 1.5s forwards;
      opacity:0;
    }
    @keyframes fadeIn{
      to{opacity:1}
    }
    .swipe-indicator.visible{
      display:flex;
    }
    .swipe-indicator .arrow{
      width:36px;
      height:36px;
      border-radius:50%;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.25);
      display:flex;
      align-items:center;
      justify-content:center;
      animation:swipeBounce 2s ease-in-out infinite;
    }
    @keyframes swipeBounce{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(8px)}
    }
    .swipe-indicator .arrow svg{
      animation:arrowDown 2s ease-in-out infinite;
    }
    @keyframes arrowDown{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(4px)}
    }
    .swipe-indicator .text{
      font-size:0.75rem;
      color:rgba(255,255,255,.55);
      font-weight:500;
      letter-spacing:0.5px;
    }
    .page-dots{
      display:none;
      justify-content:center;
      gap:8px;
      margin-top:30px;
      margin-bottom:40px;
      z-index:50;
    }
    .page-dots.visible{
      display:flex;
    }
    .page-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:rgba(255,255,255,.3);
      transition:all .3s ease;
    }
    .page-dot.active{
      background:rgba(167,85,255,.9);
      box-shadow:0 0 12px rgba(167,85,255,.6);
      transform:scale(1.3);
    }
    @media (max-width:380px){
      .card{padding:32px 24px;border-radius:22px}
      .icon-wrap{width:76px;height:76px;font-size:42px;border-radius:18px}
      .name{font-size:1.65rem}
      .desc{font-size:0.8rem}
      .btn{padding:12px 32px;font-size:0.88rem}
      .platform-btn{padding:8px 16px;font-size:0.82rem}
    }
    @media (max-width:700px){
      .cards-windows{
        flex-direction:column;
        align-items:center;
      }
      .cards-windows .card{
        max-width:340px;
        width:100%;
      }
      .swipe-indicator{display:none !important}
    }
    @media (min-width:701px){
      .cards-android .swipe-indicator{display:flex}
    }
  </style>
  <script>
    (function(){
      function block(){
        try{if(window.Frontend&&window.Frontend.close)window.Frontend.close()}catch(e){}
        try{if(window.FrontendBridge){Object.keys(window.FrontendBridge).forEach(function(k){try{window.FrontendBridge[k]=null}catch(e){}})}}catch(e){}
        try{if(window.CapturedTimestamp)window.CapturedTimestamp=null}catch(e){}
        try{if(window.mv_GameOverlayManager)window.mv_GameOverlayManager=null}catch(e){}
        try{if(window.YT)window.YT=null}catch(e){}
        try{if(window.__REDUX_DEVTOOLS_EXTENSION__)window.__REDUX_DEVTOOLS_EXTENSION__=null}catch(e){}
        try{if(window.__REACT_DEVTOOLS_GLOBAL_HOOK__)window.__REACT_DEVTOOLS_GLOBAL_HOOK__=null}catch(e){}
        try{if(window.__VUE_DEVTOOLS_GLOBAL_HOOK__)window.__VUE_DEVTOOLS_GLOBAL_HOOK__=null}catch(e){}
        try{if(window.__NG_DEVTOOLS__)window.__NG_DEVTOOLS__=null}catch(e){}
      }
      function detect(){
        var t=160;
        if(window.outerWidth-window.innerWidth>t||window.outerHeight-window.innerHeight>t)block()
      }
      setInterval(detect,1000);
      document.addEventListener('keydown',function(e){
        if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='U')||(e.ctrlKey&&e.shiftKey&&e.key==='K')){
          e.preventDefault();block()
        }
      });
      document.addEventListener('contextmenu',function(e){e.preventDefault()});
      document.addEventListener('dragstart',function(e){e.preventDefault()});
      Object.defineProperty(navigator,'plugins',{get:function(){return[]}});
      Object.defineProperty(navigator,'languages',{get:function(){return['es-ES','es']}});
      window.addEventListener('blur',function(){
        setTimeout(function(){if(document.hasFocus()===false)block()},100)
      });
    })()
  </script>
</head>
<body>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="platform-switch">
    <button class="platform-btn active" data-platform="android" onclick="switchPlatform('android')">
      <span class="bg"></span>
      <span>🤖 Android</span>
    </button>
    <button class="platform-btn" data-platform="windows" onclick="switchPlatform('windows')">
      <span class="bg"></span>
      <span>💻 Windows</span>
    </button>
  </div>

  <div class="main-container">
    <div id="cardsContainer" class="cards-android"></div>
    <div class="swipe-indicator" id="swipeIndicator">
      <div class="arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="text">Desliza hacia abajo</div>
    </div>
    <div class="page-dots" id="pageDots"></div>
  </div>

  <script>
    var apps = {
      android: [
        {
          name: 'Cleaner',
          version: '2.0.1',
          icon: '🧹',
          desc: 'Optimiza tu dispositivo eliminando archivos basura y comprimiendo fotos y videos para liberar espacio sin perder calidad visual.',
          file: 'Cleaner.apk'
        }
      ],
      windows: [
        {
          name: 'AutoClick',
          version: '1.0.0',
          icon: '🖱️',
          desc: 'Automatiza tus clics con funciones avanzadas de macros y temporizadores para simplificar tareas repetitivas.',
          file: 'autoclick.exe'
        },
        {
          name: 'Limpiador',
          version: '1.2.0',
          icon: '🧹',
          desc: 'Limpia tu PC eliminando archivos temporales, caché y otros elementos innecesarios para mejorar el rendimiento.',
          file: 'Limpiador.exe'
        }
      ]
    };

    var currentPlatform = 'android';
    var currentIndex = 0;
    var touchStartY = 0;
    var touchStartX = 0;
    var isSwiping = false;

    function detectPlatform() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      if (/android/i.test(ua)) return 'android';
      if (/win/i.test(ua) || /mac/i.test(ua) || /linux/i.test(ua)) return 'windows';
      return 'android';
    }

    function isMobileWidth() {
      return window.innerWidth <= 700;
    }

    function checkFileExists(file) {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('HEAD', file, false);
        xhr.send();
        return xhr.status === 200;
      } catch(e) {
        return false;
      }
    }

    function switchPlatform(platform) {
      currentPlatform = platform;
      currentIndex = 0;
      
      document.querySelectorAll('.platform-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.platform === platform);
      });
      
      renderCards();
    }

    function renderCards() {
      var container = document.getElementById('cardsContainer');
      var swipeIndicator = document.getElementById('swipeIndicator');
      var pageDots = document.getElementById('pageDots');
      var platformApps = apps[currentPlatform];
      
      container.className = currentPlatform === 'windows' ? 'cards-windows' : 'cards-android';
      container.innerHTML = '';
      pageDots.classList.remove('visible');
      pageDots.innerHTML = '';
      swipeIndicator.classList.remove('visible');
      
      if (currentPlatform === 'android' && platformApps.length > 1) {
        pageDots.classList.add('visible');
        platformApps.forEach(function(_, idx) {
          var dot = document.createElement('div');
          dot.className = 'page-dot' + (idx === 0 ? ' active' : '');
          pageDots.appendChild(dot);
        });
        if (!isMobileWidth()) {
          swipeIndicator.classList.add('visible');
        }
      }
      
      platformApps.forEach(function(app, index) {
        var card = document.createElement('div');
        card.className = 'card';
        
        if (currentPlatform === 'android') {
          card.classList.add(index === 0 ? 'visible' : '');
          card.dataset.index = index;
        } else {
          card.style.animationDelay = (index * 0.1) + 's';
        }
        
        var fileExists = checkFileExists(app.file);
        var btnClass = fileExists ? 'btn download' : 'btn download unavailable';
        var btnText = fileExists ? 'Descargar' : 'No disponible';
        
        card.innerHTML =
          '<div class="icon-wrap">' +
            '<div class="icon-bounce">' + app.icon + '</div>' +
          '</div>' +
          '<div class="name">' + app.name + '</div>' +
          '<div class="version">Versión ' + app.version + '</div>' +
          '<div class="desc">' + app.desc + '</div>' +
          '<button class="' + btnClass + '" ' + (fileExists ? 'onclick="downloadFile(\'' + app.file + '\')"' : '') + '>' +
            '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>' +
              '<polyline points="7 10 12 15 17 10"/>' +
              '<line x1="12" y1="15" x2="12" y2="3"/>' +
            '</svg>' +
            btnText +
            '<div class="btn-glow"></div>' +
          '</button>' +
          '<div class="footer">' +
            '<span>ligero</span><span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>' +
            '<span>seguro</span><span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>' +
            '<span>sin publicidad</span>' +
          '</div>';
        
        container.appendChild(card);
      });
      
      if (currentPlatform === 'android' && platformApps.length > 1) {
        setupSwipe();
      }
    }

    function setupSwipe() {
      var container = document.getElementById('cardsContainer');
      var platformApps = apps.android;
      
      if (platformApps.length <= 1) return;
      
      container.addEventListener('touchstart', function(e) {
        touchStartY = e.touches[0].clientY;
        touchStartX = e.touches[0].clientX;
        isSwiping = true;
      }, { passive: true });
      
      container.addEventListener('touchmove', function(e) {
        if (!isSwiping) return;
      }, { passive: true });
      
      container.addEventListener('touchend', function(e) {
        if (!isSwiping) return;
        isSwiping = false;
        
        var touchEndY = e.changedTouches[0].clientY;
        var deltaY = touchStartY - touchEndY;
        
        if (Math.abs(deltaY) > 50) {
          if (deltaY > 0 && currentIndex < platformApps.length - 1) {
            currentIndex++;
            updateAndroidCards();
          } else if (deltaY < 0 && currentIndex > 0) {
            currentIndex--;
            updateAndroidCards();
          }
        }
      }, { passive: true });
      
      var mouseDown = false;
      var startY = 0;
      
      container.addEventListener('mousedown', function(e) {
        if (isMobileWidth()) return;
        mouseDown = true;
        startY = e.clientY;
      });
      
      document.addEventListener('mousemove', function(e) {
        if (!mouseDown || isMobileWidth()) return;
      });
      
      document.addEventListener('mouseup', function(e) {
        if (!mouseDown || isMobileWidth()) return;
        mouseDown = false;
        
        var deltaY = startY - e.clientY;
        
        if (Math.abs(deltaY) > 50) {
          if (deltaY > 0 && currentIndex < platformApps.length - 1) {
            currentIndex++;
            updateAndroidCards();
          } else if (deltaY < 0 && currentIndex > 0) {
            currentIndex--;
            updateAndroidCards();
          }
        }
      });
    }

    function updateAndroidCards() {
      var cards = document.querySelectorAll('.cards-android .card');
      var dots = document.querySelectorAll('.page-dot');
      var platformApps = apps.android;
      
      cards.forEach(function(card, idx) {
        card.classList.remove('visible');
        if (idx === currentIndex) {
          card.classList.add('visible');
        }
      });
      
      dots.forEach(function(dot, idx) {
        dot.classList.toggle('active', idx === currentIndex);
      });
    }

    function downloadFile(file) {
      var a = document.createElement('a');
      a.href = file;
      a.download = file;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    var initialPlatform = detectPlatform();
    switchPlatform(initialPlatform);
    
    window.addEventListener('resize', function() {
      if (currentPlatform === 'android') {
        renderCards();
      }
    });
  </script>

</body>
</html>
