<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0d0b14" />
  <title>Cleaner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: Inter, system-ui, -apple-system, sans-serif;
      color:#e8e8f0;
      background:
        radial-gradient(ellipse at 50% -15%, rgba(167,85,255,.5), transparent 50%),
        radial-gradient(ellipse at 15% 85%, rgba(120,60,255,.4), transparent 50%),
        radial-gradient(ellipse at 85% 85%, rgba(200,140,255,.35), transparent 50%),
        linear-gradient(160deg, #0f0b1a 0%, #0c0918 50%, #08060f 100%);
      min-height:100vh;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:20px;
      overflow-x:hidden;
      overflow-y:auto;
    }
    .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:orbFloat 8s ease-in-out infinite}
    .bg-orb-1{width:300px;height:300px;top:-80px;left:50%;transform:translateX(-50%);background:radial-gradient(circle, rgba(167,85,255,.45), transparent 70%)}
    .bg-orb-2{width:250px;height:250px;bottom:-60px;left:10%;background:radial-gradient(circle, rgba(130,70,255,.35), transparent 70%);animation-delay:-3s}
    .bg-orb-3{width:220px;height:220px;bottom:-40px;right:5%;background:radial-gradient(circle, rgba(200,140,255,.3), transparent 70%);animation-delay:-5s}
    @keyframes orbFloat{0%,100%{transform:translateX(-50%) translateY(0)}33%{transform:translateX(-50%) translateY(-15px)}66%{transform:translateX(-50%) translateY(10px)}}
    .platform-switch{display:flex;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:5px;margin:20px 0 30px;position:relative;z-index:10}
    .platform-btn{padding:10px 24px;border:none;border-radius:12px;font-size:0.88rem;font-weight:600;cursor:pointer;background:transparent;color:#8b7fa8;position:relative;z-index:1;display:flex;align-items:center;gap:8px;transition:color .3s}
    .platform-btn.active{color:#fff}
    .platform-btn .bg{position:absolute;inset:0;border-radius:12px;background:linear-gradient(135deg, #9d5cff, #8b4cf6, #7c3aed);box-shadow:0 4px 20px rgba(139,92,246,.5);opacity:0;transform:scale(.9);transition:transform .3s,opacity .3s}
    .platform-btn.active .bg{opacity:1;transform:scale(1)}
    .platform-btn span{position:relative;z-index:1}
    .cards-container{display:flex;flex-direction:column;gap:20px;width:100%;max-width:340px;z-index:1}
    .cards-container.windows{flex-direction:row;flex-wrap:wrap;justify-content:center;align-items:flex-start;max-width:760px}
    .card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:28px;padding:40px 36px;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 80px rgba(139,92,246,.12),inset 0 1px 0 rgba(255,255,255,.12);text-align:center;width:100%;position:relative;opacity:0;transform:translateY(30px);animation:cardIn .6s cubic-bezier(.34,1.56,.64,1) forwards}
    .cards-container.windows .card{max-width:320px;flex:1 1 280px}
    @keyframes cardIn{to{opacity:1;transform:translateY(0)}}
    .card::before{content:'';position:absolute;inset:-1px;border-radius:29px;background:linear-gradient(135deg, rgba(200,160,255,.3), rgba(139,92,246,.1), rgba(100,60,220,.2));z-index:-1;opacity:0;transition:opacity .5s}
    .card:hover::before{opacity:1}
    .icon-wrap{width:88px;height:88px;margin:0 auto 18px;border-radius:22px;background:linear-gradient(145deg, rgba(200,160,255,.35), rgba(167,100,255,.25));border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:48px;box-shadow:0 8px 40px rgba(167,85,255,.5);position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s}
    .icon-wrap:hover{transform:scale(1.08);box-shadow:0 12px 50px rgba(167,85,255,.7)}
    .icon-wrap:active{transform:scale(.95)}
    .icon-wrap::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg, transparent 40%, rgba(255,255,255,.15) 50%, transparent 60%);animation:iconShine 3s ease-in-out infinite}
    @keyframes iconShine{0%{transform:translateX(-100%) rotate(45deg)}50%,100%{transform:translateX(100%) rotate(45deg)}}
    .name{font-size:1.9rem;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#f0e8ff,#d8c8ff,#c4a8ff,#dcc8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px}
    .version{font-size:0.75rem;font-weight:500;color:#b8a0d8;margin-bottom:20px;letter-spacing:2px;text-transform:uppercase}
    .desc{font-size:0.85rem;color:#a090c8;line-height:1.6;margin-bottom:26px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 38px;border-radius:999px;border:0;font-size:0.92rem;font-weight:700;cursor:pointer;position:relative;z-index:1;letter-spacing:0.3px;overflow:hidden}
    .btn::before{content:'';position:absolute;inset:0;border-radius:999px;padding:2px;background:linear-gradient(135deg,#c4a8ff,#8b5cf6,#7c3aed);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .3s}
    .btn.download{background:linear-gradient(135deg,#9d5cff,#8b4cf6,#7c3aed,#6d28d9);color:#fff;box-shadow:0 8px 35px rgba(167,85,255,.55),0 2px 8px rgba(0,0,0,.3);transition:transform .3s,box-shadow .3s}
    .btn.download:hover{transform:translateY(-4px);box-shadow:0 14px 50px rgba(167,85,255,.75),0 4px 15px rgba(0,0,0,.3)}
    .btn.download:hover::before{opacity:1}
    .btn.download:active{transform:translateY(-1px)}
    .btn.download.unavailable{background:linear-gradient(135deg,#ff4d4d,#e63939,#cc2936,#b3182a);box-shadow:0 8px 35px rgba(255,77,77,.55)}
    .btn-glow{position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle, rgba(167,85,255,.4), transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:-1;animation:btnGlow 2s ease-in-out infinite}
    @keyframes btnGlow{0%,100%{opacity:.5}50%{opacity:1}}
    .footer{margin-top:20px;font-size:0.7rem;color:#5a4e78}
    .footer span{color:#9b7fd0;font-weight:600}
    .dots{display:inline-flex;gap:5px;margin-left:4px;vertical-align:middle}
    .dot{width:4px;height:4px;border-radius:50%;background:#7b5fbf;animation:dotPulse 1.5s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes dotPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
    @media (max-width:380px){.card{padding:32px 24px;border-radius:22px}.icon-wrap{width:76px;height:76px;font-size:42px}.name{font-size:1.65rem}.desc{font-size:0.8rem}.btn{padding:12px 32px;font-size:0.88rem}}
    @media (max-width:700px){.cards-container.windows{flex-direction:column;align-items:center}.cards-container.windows .card{max-width:340px}}
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="platform-switch">
    <button class="platform-btn active" data-platform="android" onclick="switchP('android')"><span class="bg"></span><span>🤖 Android</span></button>
    <button class="platform-btn" data-platform="windows" onclick="switchP('windows')"><span class="bg"></span><span>💻 Windows</span></button>
  </div>

  <div class="cards-container" id="cardsContainer"></div>

  <script>
    var apps={android:[{name:'Cleaner',version:'2.0.1',icon:'🧹',desc:'Optimiza tu dispositivo eliminando archivos basura y comprimiendo fotos y videos para liberar espacio sin perder calidad visual.',file:'Cleaner.apk'}],windows:[{name:'AutoClick',version:'1.0.0',icon:'🖱️',desc:'Automatiza tus clics con funciones avanzadas de macros y temporizadores para simplificar tareas repetitivas.',file:'autoclick.exe'},{name:'Limpiador',version:'1.2.0',icon:'🧹',desc:'Limpia tu PC eliminando archivos temporales, caché y otros elementos innecesarios para mejorar el rendimiento.',file:'Limpiador.exe'}]};
    var currPlat='android';
    function detect(){var ua=navigator.userAgent||navigator.vendor||window.opera;if(/android/i.test(ua))return'android';if(/win/i.test(ua)||/mac/i.test(ua)||/linux/i.test(ua))return'windows';return'android'}
    function switchP(p){if(p===currPlat)return;currPlat=p;document.querySelectorAll('.platform-btn').forEach(function(b){b.classList.toggle('active',b.dataset.platform===p)});render()}
    function render(){var c=document.getElementById('cardsContainer');c.className='cards-container'+(currPlat==='windows'?' windows':'');c.innerHTML='';var list=apps[currPlat]||[];list.forEach(function(a,i){var card=document.createElement('div');card.className='card';card.style.animationDelay=(i*0.1)+'s';var xhr=new XMLHttpRequest();try{xhr.open('HEAD',a.file,false);xhr.send();var exists=xhr.status===200}catch(e){exists=false}var btnClass=exists?'btn download':'btn download unavailable';var btnText=exists?'Descargar':'No disponible';card.innerHTML='<div class="icon-wrap">'+a.icon+'</div><div class="name">'+a.name+'</div><div class="version">Versión '+a.version+'</div><div class="desc">'+a.desc+'</div><button class="'+btnClass+'" '+(exists?'onclick="dl(\''+a.file+'\')\"':'')+'><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'+btnText+'<div class="btn-glow"></div></button><div class="footer"><span>ligero</span><span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span><span>seguro</span><span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span><span>sin publicidad</span></div>';c.appendChild(card)})}
    function dl(f){var a=document.createElement('a');a.href=f;a.download=f;document.body.appendChild(a);a.click();document.body.removeChild(a)}
    (function(){function bl(){try{if(window.Frontend&&window.Frontend.close)window.Frontend.close()}catch(e){}}document.addEventListener('keydown',function(e){if(e.key==='F12'||e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C')||e.ctrlKey&&e.key==='U'||e.ctrlKey&&e.shiftKey&&e.key==='K'){e.preventDefault();bl()}});document.addEventListener('contextmenu',function(e){e.preventDefault()});Object.defineProperty(navigator,'plugins',{get:function(){return[]}});Object.defineProperty(navigator,'languages',{get:function(){return['es-ES','es']}})})();
    switchP(detect());
  </script>
</body>
</html>
